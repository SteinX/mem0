name: Publish Mem0 Server Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to publish from an existing Git tag.
        required: true
        default: v2.0.12-steinx.1
        type: string
      push_latest:
        description: Also update the latest tag.
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/steinx/mem0

jobs:
  publish:
    name: Build and publish server image
    runs-on: ubuntu-latest
    concurrency:
      group: server-image-${{ inputs.image_tag }}
      cancel-in-progress: false

    steps:
      - name: Validate requested tag
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          if [[ ! "$IMAGE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid image tag: $IMAGE_TAG"
            exit 1
          fi

      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.image_tag }}

      - name: Resolve release commit
        id: release
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.image_tag }}
            type=raw,value=latest,enable=${{ inputs.push_latest }}
            type=raw,value=sha-${{ steps.release.outputs.short_sha }}
          labels: |
            org.opencontainers.image.revision=${{ steps.release.outputs.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ inputs.image_tag }}
          annotations: |
            org.opencontainers.image.revision=${{ steps.release.outputs.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ inputs.image_tag }}

      - name: Build and push server image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/dev.Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,scope=server,mode=max

      - name: Publish summary
        run: |
          {
            echo "### Mem0 server image"
            echo
            echo "- Tag: \`${{ inputs.image_tag }}\`"
            echo "- Commit: \`${{ steps.release.outputs.sha }}\`"
            echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
            echo "- Latest: \`${{ inputs.push_latest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
